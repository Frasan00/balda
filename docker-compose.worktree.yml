services:
  node:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
    tty: true
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    env_file:
      - .env.test
    command: ["tail", "-f", "/dev/null"]
    networks:
      - local-network

  bun:
    build:
      context: .
      dockerfile: docker/bun.Dockerfile
    tty: true
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    env_file:
      - .env.test
    command: ["tail", "-f", "/dev/null"]
    networks:
      - local-network

  deno:
    build:
      context: .
      dockerfile: docker/deno.Dockerfile
    tty: true
    env_file:
      - .env.test
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
    networks:
      - local-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    tty: true
    command: redis-server --requirepass root
    networks:
      local-network:
        aliases:
          - balda-redis

  sqs:
    image: softwaremill/elasticmq
    environment:
      - JAVA_OPTS=-Dconfig.file=/opt/elasticmq.conf
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    networks:
      local-network:
        aliases:
          - balda-sqs

  postgres:
    image: postgres:17.4
    restart: unless-stopped
    tty: true
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    networks:
      local-network:
        aliases:
          - balda-postgres

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=s3,cloudfront,iam,lambda
      - DEBUG=1
    env_file:
      - .env.test
    volumes:
      - "./.localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - local-network

  mqtt:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      local-network:
        aliases:
          - balda-mqtt

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: unless-stopped
    volumes:
      - azurite_data:/data
    command: >
      azurite-blob
      --blobHost 0.0.0.0
      --blobPort 10000
      --location /data
      --loose
    environment:
      - AZURITE_ACCOUNT_KEY=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/devstoreaccount1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      local-network:
        aliases:
          - balda-azurite-blob

  mailcatcher:
    image: schickling/mailcatcher
    restart: unless-stopped
    networks:
      local-network:
        aliases:
          - balda-mailcatcher

volumes:
  azurite_data:
    driver: local

networks:
  local-network:
    driver: bridge
